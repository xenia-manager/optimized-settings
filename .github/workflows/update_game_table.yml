name: Update Table of optimized games
description: This workflow updates the table containing all of the games with optimized settings in the README file and updates the game counter

on:
  workflow_run:
    workflows: ["Validate Settings"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

jobs:
  check-changes:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      has_settings_changes: ${{ steps.changes.outputs.settings }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for settings changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "settings=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "^settings/" && echo "settings=true" >> $GITHUB_OUTPUT || echo "settings=false" >> $GITHUB_OUTPUT
          fi

  update-table:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.has_settings_changes == 'true' && (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize and update submodules
        run: |
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gitpython

      - name: Generate settings.json
        run: |
          python scripts/generate_settings_json.py

      - name: Run update game table script
        run: |
          python scripts/update_game_table.py

      - name: Update README Counter
        run: |
          python scripts/game_counter.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet README.md data/settings.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --global user.name "xeniamanager-ci"
          git config --global user.email "214508751+xeniamanager-ci@users.noreply.github.com"
          git add README.md assets/ data/settings.json
          # Avoid failing if no assets change but README did, or vice versa
          git diff --cached --quiet || git commit -m "chore: Update settings.json, game table, counter, and assets"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
