name: Validate Settings
description: Validates TOML files in the settings directory for correct format and types

on:
  pull_request:
    paths:
      - "settings/**"
  push:
    paths:
      - "settings/**"

jobs:
  validate-settings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Validate TOML files
        run: |
          python scripts/validate_toml.py settings
