# Title Name: Forza Horizon
# Title ID: 4D5309C9

[GPU]
clear_memory_page_state = true # Fixes warped graphics in game.
framerate_limit = 120 # Caps the FPS to 60.
readback_resolve = "full" # Fixes designs and thumbnails of cars at the cost of performance (Use it with controller_hotkeys to disable it after purchasing a car to have proper thumbnails to improve performance)
vsync = false # Unlocks FPS

[General]
controller_hotkeys = true # Turn off Readback Resolve with A + Guide Button when the car thumbnails work.